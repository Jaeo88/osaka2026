const [expenseDesc, setExpenseDesc] = useState('');
const [expenseCost, setExpenseCost] = useState('');
const [paymentMethod, setPaymentMethod] = useState('ICOCA');

// 閃卡/大字報狀態 (已移除語音功能)
const [fullscreenNote, setFullscreenNote] = useState(null);

// 安全讀取 LocalStorage
const [transportEx, setTransportEx] = useState(() => {
try { return JSON.parse(localStorage.getItem('osaka_trans_safe')) || []; }
catch(e) { return []; }
});
const [shoppingEx, setShoppingEx] = useState(() => {
try { return JSON.parse(localStorage.getItem('osaka_shop_safe')) || []; }
catch(e) { return []; }
});

// 儲存資料
useEffect(() => {
try {
localStorage.setItem('osaka_trans_safe', JSON.stringify(transportEx));
localStorage.setItem('osaka_shop_safe', JSON.stringify(shoppingEx));
} catch(e) { console.error(e); }
}, [transportEx, shoppingEx]);

// 安全計算金額
const totalTrans = transportEx.reduce((sum, item) => sum + (item.cost || 0), 0);
const totalShop = shoppingEx.reduce((sum, item) => sum + (item.cost || 0), 0);
const totalAll = totalTrans + totalShop;

// 終極修復：最標準、100%相容的 Google Maps 連結
const getGoogleMapUrl = (query) => https://maps.google.com/?q=${encodeURIComponent(query)}`;

const convertHkdToJpy = (val) => {
setHkdInput(val);
if (val === '') setJpyInput('');
else setJpyInput((parseFloat(val) * exchangeRate).toFixed(0));
};

const convertJpyToHkd = (val) => {
setJpyInput(val);
if (val === '') setHkdInput('');
else setHkdInput((parseFloat(val) / exchangeRate).toFixed(2));
};

const showToast = (msg) => {
setToastMsg(msg);
setTimeout(() => setToastMsg(''), 2500);
};

const copyToClipboard = (text) => {
const textArea = document.createElement("textarea");
textArea.value = text;
document.body.appendChild(textArea);
textArea.select();
try {
document.execCommand('copy');
showToast('✅ 成功複製地址！');
} catch (err) {
showToast('❌ 複製失敗');
}
document.body.removeChild(textArea);
};

const openExpenseModal = (type) => {
setExpenseType(type);
setExpenseDesc('');
setExpenseCost('');
setPaymentMethod('ICOCA');
setShowModal(true);
};

const saveExpense = () => {
if (expenseDesc.trim() && expenseCost) {
const newItem = { id: Date.now(), desc: expenseDesc, cost: parseInt(expenseCost), method: paymentMethod };
if (expenseType === 'trans') setTransportEx([...transportEx, newItem]);
else setShoppingEx([...shoppingEx, newItem]);
setShowModal(false);
showToast('💰 開支已記錄');
}
};

const deleteExpense = (type, id) => {
if (type === 'trans') setTransportEx(transportEx.filter(i => i.id !== id));
else setShoppingEx(shoppingEx.filter(i => i.id !== id));
showToast('🗑️ 已刪除記錄');
};

<div className="absolute left-0 top-0 w-10 h-10 bg-[#1a2b4c] text-white rounded-xl flex flex-col items-center justify-center z-10 shadow-md">
<span className="text-[12px] font-black leading-none">{item.time.split(':')[0]}</span>
<span className="text-[12px] font-black leading-none">{item.time.split(':')[1] || '00'}</span>
</div>

<div className="flex flex-col pt-0.5">
{item.loc ? (
<a
href={getGoogleMapUrl(item.loc)}
target="_blank"
rel="noopener noreferrer"
className="text-[16px] font-black leading-snug tracking-tight text-blue-700 hover:text-blue-900 underline decoration-blue-200 underline-offset-4 flex items-center flex-wrap"
>
{item.desc}
<i className="fa-solid fa-map-pin text-[12px] ml-1.5 text-blue-400"></i>
</a>
) : (
<span className="text-[16px] font-black leading-snug tracking-tight text-[#1a2b4c]">
{item.desc}
</span>
)}

{item.note && (
<p className="text-[12px] text-amber-700 font-bold mt-1.5 flex items-start leading-relaxed">
<span className="text-amber-400 mr-1 shrink-0">✨</span>{item.note}
</p>
)}

{item.taxi && (
<div className="mt-2.5 flex items-center gap-1.5 text-[10px] font-black text-blue-600 bg-blue-50 px-3 py-1.5 rounded-lg border border-blue-100 w-fit">
<i className="fa-solid fa-location-arrow shrink-0"></i> {item.taxi}
</div>
)}
</div>
</div>
))}
</div>
</div>
</div>
)}

{/* ==================== 2. 地點地址 ==================== */}
{activeTab === 'places' && (
<div className="space-y-4">
<div className="bg-emerald-50 p-4 rounded-xl border border-emerald-100 flex items-start gap-2 mb-2">
<i className="fa-solid fa-map text-emerald-600 mt-0.5"></i>
<p className="text-xs text-emerald-800 font-bold leading-relaxed">
行程中所有重要打卡地點。<br/>點擊右側複製按鈕可直接獲取日文地址，方便貼上地圖搜尋！
</p>
</div>
{placesData.map((place, idx) => (
<div key={idx} className="bg-white rounded-2xl p-5 border border-gray-200 shadow-sm">
<p className="text-xs font-black text-[#1a2b4c] mb-3 border-b border-gray-100 pb-2 flex items-center gap-1.5">
<span className="w-1.5 h-1.5 bg-[#fcd34d] rounded-full"></span>
{place.cat}
</p>
<div className="space-y-1">
<p className="text-base font-black text-[#1a2b4c]">
{place.koName} <span className="text-sm text-gray-500 font-bold ml-1">({place.zhName})</span>
</p>
<div className="flex items-start gap-2 mt-2 pt-2 bg-gray-50 p-3 rounded-xl border border-gray-100">
<div className="flex-1 overflow-hidden">
<p className="text-sm font-black text-gray-800 mb-0.5 select-all truncate">{place.koAddr}</p>
</div>
<button onClick={() => copyToClipboard(place.koAddr)} className="p-2.5 bg-white border border-gray-200 rounded-xl shadow-sm hover:bg-gray-100 active:scale-90 transition-all shrink-0">
<i className="fa-solid fa-copy text-[#1a2b4c]"></i>
</button>
</div>
</div>
</div>
))}
</div>
)}

{/* ==================== 3. 實用大字報閃卡 (取代語音) ==================== */}
{activeTab === 'phrase' && (
<div className="space-y-4">
<div className="bg-amber-50 p-4 rounded-xl border border-amber-100 flex items-start gap-2 mb-2">
<i className="fa-solid fa-chalkboard-user text-amber-600 mt-0.5"></i>
<p className="text-xs text-amber-800 font-bold leading-relaxed">
日本溝通不求人！點擊卡片任何位置，即可彈出全螢幕「日文大字報」，直接展示給日本店員或司機看。
</p>
</div>
{japanesePhrases.map((note, idx) => (
<div key={idx} onClick={() => setFullscreenNote(note)} className="bg-white rounded-2xl p-5 border border-gray-200 shadow-sm active:scale-95 transition-transform cursor-pointer relative">
<p className="text-[11px] font-black text-gray-400 mb-2 tracking-widest">{note.t}</p>
<div className="bg-[#1a2b4c] p-4 rounded-xl mb-3 shadow-inner">
<p className="text-lg font-bold text-white text-center">"{note.k}"</p>
</div>
<div className="flex justify-between items-center mt-2">
<p className="text-[13px] text-blue-800 font-bold">{note.d}</p>
<i className="fa-solid fa-chevron-right text-gray-300"></i>
</div>
</div>
))}
</div>
)}

{/* ==================== 4. 記帳功能 ==================== */}
{activeTab === 'expense' && (
<div className="space-y-5">
<div className="bg-white rounded-2xl p-5 shadow-sm border border-gray-100">
<div className="flex justify-between items-center mb-5">
<h3 className="text-lg font-black text-[#1a2b4c] flex items-center gap-2"><i className="fa-solid fa-train-subway text-blue-500"></i> 交通車資</h3>
<button onClick={() => openExpenseModal('trans')} className="bg-[#1a2b4c] text-white p-2.5 rounded-xl shadow-md active:scale-95 transition-transform"><i className="fa-solid fa-plus w-5 h-5 flex items-center justify-center"></i></button>
</div>
<div className="space-y-3">
{transportEx.length === 0 && <p className="text-center text-gray-400 text-xs py-2">尚無紀錄</p>}
{transportEx.map(item => (
<div key={item.id} className="flex justify-between items-center bg-gray-50 p-4 rounded-xl border border-gray-100">
<div className="flex flex-col">
<span className="text-[15px] font-bold text-gray-700">{item.desc}</span>
<span className="mt-1.5">{getMethodBadge(item.method)}</span>
</div>
<div className="flex items-center gap-3">
<span className="text-base font-black text-blue-600">￥{item.cost.toLocaleString()}</span>
<button onClick={() => deleteExpense('trans', item.id)} className="text-red-400 p-1.5"><i className="fa-solid fa-trash-can"></i></button>
</div>
</div>
))}
</div>
</div>

<div className="bg-white rounded-2xl p-5 shadow-sm border border-gray-100">
<div className="flex justify-between items-center mb-5">
<h3 className="text-lg font-black text-[#1a2b4c] flex items-center gap-2"><i className="fa-solid fa-bag-shopping text-pink-500"></i> 購物美食</h3>
<button onClick={() => openExpenseModal('shop')} className="bg-pink-600 text-white p-2.5 rounded-xl shadow-md active:scale-95 transition-transform"><i className="fa-solid fa-plus w-5 h-5 flex items-center justify-center"></i></button>
</div>
<div className="space-y-3">
{shoppingEx.length === 0 && <p className="text-center text-gray-400 text-xs py-2">尚無紀錄</p>}
{shoppingEx.map(item => (
<div key={item.id} className="flex justify-between items-center bg-gray-50 p-4 rounded-xl border border-gray-100">
<div className="flex flex-col">
<span className="text-[15px] font-bold text-gray-700">{item.desc}</span>
<span className="mt-1.5">{getMethodBadge(item.method)}</span>
</div>
<div className="flex items-center gap-3">
<span className="text-base font-black text-pink-600">￥{item.cost.toLocaleString()}</span>
<button onClick={() => deleteExpense('shop', item.id)} className="text-red-400 p-1.5"><i className="fa-solid fa-trash-can"></i></button>
</div>
</div>
))}
</div>
</div>
</div>
)}
</div>

{/* 底部固定導航與結算 */}
<div className="fixed bottom-0 left-0 right-0 z-[100] shadow-[0_-5px_15px_rgba(0,0,0,0.05)]">
<div className="bg-[#1a2b4c] px-5 py-2 flex justify-between items-center border-t border-[#1a2b4c]">
<div className="flex items-center gap-2">
<span className="text-[10px] font-black text-white/60 uppercase tracking-widest">Total</span>
<span className="text-base font-black text-white tracking-tight">￥{totalAll.toLocaleString()}</span>
</div>
<div className="flex items-baseline gap-2">
<span className="text-[10px] font-black text-[#fcd34d]/80 uppercase tracking-widest">HKD</span>
<span className="text-base font-black text-[#fcd34d] tracking-tight">$`{(totalAll/exchangeRate).toFixed(0)}</span>
</div>
</div>
</div>

{/* 記帳彈窗 Modal */}
{showModal && (
<div className="fixed inset-0 bg-[#1a2b4c]/80 backdrop-blur-sm z-[400] flex items-center justify-center p-5">
<div className="bg-white w-full max-w-sm rounded-3xl p-6 shadow-2xl animate-in zoom-in duration-200">
<h3 className="text-xl font-black text-[#1a2b4c] mb-6">
{expenseType === 'trans' ? '🚇 新增交通支出' : '🛍️ 新增購物美食'}
</h3>
<div className="space-y-4">
<div>
<label className="text-xs font-black text-gray-400 uppercase mb-2 block">項目名稱</label>
<input type="text" value={expenseDesc} onChange={e => setExpenseDesc(e.target.value)} placeholder="輸入項目..." className="w-full bg-gray-50 border border-gray-200 rounded-xl px-4 py-3 text-base font-bold text-gray-800 focus:outline-none focus:border-[#1a2b4c]" />
</div>
<div>
<label className="text-xs font-black text-gray-400 uppercase mb-2 block">金額 (JPY)</label>
<input type="number" value={expenseCost} onChange={e => setExpenseCost(e.target.value)} placeholder="0" className="w-full bg-gray-50 border border-gray-200 rounded-xl px-4 py-3 text-xl font-black text-[#1a2b4c] focus:outline-none focus:border-[#1a2b4c]" />
</div>
<div>
<label className="text-xs font-black text-gray-400 uppercase mb-2 block">付款方式</label>
<div className="flex gap-2">
{['現金', '信用卡', 'ICOCA'].map(method => (
<button
key={method}
onClick={() => setPaymentMethod(method)}
className={flex-1 py-2.5 rounded-xl text-xs font-black border transition-colors${paymentMethod === method ? 'bg-blue-50 border-blue-400 text-blue-700' : 'bg-white border-gray-200 text-gray-400'}} &gt; {method} &lt;/button&gt; ))} &lt;/div&gt; &lt;/div&gt; &lt;/div&gt; &lt;div className="flex gap-3 mt-8"&gt; &lt;button onClick={() =&gt; setShowModal(false)} className="flex-1 py-3.5 bg-gray-100 text-gray-600 rounded-xl font-black text-sm"&gt;取消&lt;/button&gt; &lt;button onClick={saveExpense} className={flex-1 py-3.5 text-white rounded-xl font-black text-sm ${expenseType === 'trans' ? 'bg-[#1a2b4c]' : 'bg-pink-600'}`}>儲存紀錄</button>
</div>
</div>
</div>
)}

{/* 全螢幕大字報 (取代語音) */}
{fullscreenNote && (
<div className="fixed inset-0 bg-[#1a2b4c] z-[500] flex flex-col items-center justify-center p-8" onClick={() => setFullscreenNote(null)}>
<button className="absolute top-8 right-8 p-4 text-white/50 z-20"><i className="fa-solid fa-xmark text-3xl"></i></button>
<div className="w-full text-center space-y-10 z-10">
<p className="text-[#fcd34d] text-lg font-black tracking-widest uppercase"><i className="fa-solid fa-eye"></i> 請展示給對方看</p>
<div className="bg-white/10 rounded-3xl p-10 border border-white/20 backdrop-blur-md shadow-2xl">
<p className="text-4xl font-black text-white leading-snug break-words">{fullscreenNote.k}</p>
</div>
<p className="text-gray-300 text-xl font-bold">{fullscreenNote.d}</p>
<p className="text-white/30 text-sm mt-10">點擊畫面任何地方關閉</p>
</div>
</div>
)}
</div>
);
};

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
</script>
</body>
</html>
