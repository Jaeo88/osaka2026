// 安全渲染 Lucide Icon 的 React 元件，避免直接操作 DOM 導致 React 崩潰
const Icon = ({ name, className }) => {
if (!window.lucide || !window.lucide.icons[name]) return null;
return <span className="inline-flex items-center justify-center" dangerouslySetInnerHTML={{ __html: window.lucide.icons[name].toSvg({ class: className }) }} />;
};

try { return JSON.parse(localStorage.getItem('osaka_trans_pro_v10')) || []; }
catch(e) { return []; }
});
const [shoppingEx, setShoppingEx] = useState(() => {
try { return JSON.parse(localStorage.getItem('osaka_shop_pro_v10')) || []; }
catch(e) { return []; }
});

useEffect(() => {
localStorage.setItem('osaka_trans_pro_v10', JSON.stringify(transportEx));
localStorage.setItem('osaka_shop_pro_v10', JSON.stringify(shoppingEx));
}, [transportEx, shoppingEx]);

// 天氣資料（定位大阪）
useEffect(() => {
const weatherApiUrl = 'https://api.open-meteo.com/v1/forecast?latitude=34.6937&longitude=135.5023&current=temperature_2m,apparent_temperature,weather_code&hourly=temperature_2m,weather_code,precipitation_probability&daily=weather_code,temperature_2m_max,temperature_2m_min&timezone=Asia%2FTokyo&forecast_days=5';
fetch(weatherApiUrl)
.then(res => res.json())
.then(data => { setWeather(data); setWeatherLoading(false); })
.catch(err => { console.error(err); setWeatherLoading(false); });
}, []);

const getWeatherInfo = (code) => {
if ([0, 1].includes(code)) return { icon: '☀️', desc: '晴空萬里', umbrella: false };
if ([2, 3].includes(code)) return { icon: '☁️', desc: '多雲微陰', umbrella: false };
if ([45, 48].includes(code)) return { icon: '🌫️', desc: '有霧', umbrella: false };
if ([51, 53, 55, 56, 57, 61, 63, 65, 66, 67, 80, 81, 82].includes(code)) return { icon: '🌧️', desc: '夏日陣雨', umbrella: true };
if ([71, 73, 75, 77, 85, 86].includes(code)) return { icon: '❄️', desc: '下雪', umbrella: true };
if ([95, 96, 99].includes(code)) return { icon: '⛈️', desc: '雷陣雨', umbrella: true };
return { icon: '🌤️', desc: '未知', umbrella: false };
};

const getClothingSuggestion = (apparentTemp) => {
if (apparentTemp >= 30) return "正值盛夏酷暑！強烈建議穿著極透氣排汗短袖，攜帶防曬傘、手持風扇，隨時補充電解質以防中暑。";
if (apparentTemp >= 23) return "氣候炎熱舒適。適合短袖，生理期期間出入冷氣房或黃昏上山，背包請備一件薄外套。";
return "體感微涼，洋蔥式穿法最保險。";
};

const convertHkdToJpy = (val) => {
setHkdInput(val);
if (val === '') setJpyInput('');
else setJpyInput((parseFloat(val) * exchangeRate).toFixed(0));
};

const convertJpyToHkd = (val) => {
setJpyInput(val);
if (val === '') setHkdInput('');
else setHkdInput((parseFloat(val) / exchangeRate).toFixed(2));
};

const openExpenseModal = (type) => {
setExpenseType(type);
setExpenseDesc('');
setExpenseCost('');
setPaymentMethod('IC卡');
setShowModal(true);
};

const saveExpense = () => {
if (expenseDesc.trim() && expenseCost) {
const newItem = { id: Date.now(), desc: expenseDesc, cost: parseInt(expenseCost), method: paymentMethod };
if (expenseType === 'trans') setTransportEx([...transportEx, newItem]);
else setShoppingEx([...shoppingEx, newItem]);
setShowModal(false);
}
};

const deleteExpense = (type, id) => {
if (type === 'trans') setTransportEx(transportEx.filter(i => i.id !== id));
else setShoppingEx(shoppingEx.filter(i => i.id !== id));
};

const totalTrans = transportEx.reduce((a, c) => a + c.cost, 0);
const totalShop = shoppingEx.reduce((a, c) => a + c.cost, 0);
const totalAll = totalTrans + totalShop;

const showToast = (msg) => {
setToastMsg(msg);
setTimeout(() => setToastMsg(''), 2500);
};

const copyToClipboard = (text) => {
const textArea = document.createElement("textarea");
textArea.value = text;
document.body.appendChild(textArea);
textArea.select();
try {
document.execCommand('copy');
showToast('✅ 已複製日文地址！');
} catch (err) {
showToast('❌ 複製失敗，請手動複製');
}
document.body.removeChild(textArea);
};

const playJapaneseVoice = (text, e) => {
if (e) e.stopPropagation();
if ('speechSynthesis' in window) {
window.speechSynthesis.cancel();
const utterance = new SpeechSynthesisUtterance(text);
utterance.lang = 'ja-JP';
utterance.rate = 0.85;
window.speechSynthesis.speak(utterance);
}
};

<p className="text-lg font-bold text-white text-center leading-relaxed pr-8">"{note.k.split('(')[0]}"</p>
<p className="text-[10px] text-pink-300 text-center mt-1 font-mono">{note.k.includes('(') ? note.k.slice(note.k.indexOf('(')) : ''}</p>
<button onClick={(e) => { e.stopPropagation(); playJapaneseVoice(note.k.split('(')[0], e); }} className="absolute right-3 top-1/2 transform -translate-y-1/2 p-2.5 bg-white/20 rounded-full text-yellow-300">
<Icon name="volume-2" className="w-5 h-5" />
</button>
</div>
<p className="text-xs sm:text-sm text-indigo-950 font-bold w-[90%]">{note.d}</p>
</div>
))}
</div>
)}
</div>

{/* 底部總記帳浮動欄 */}
<div className="fixed bottom-0 left-0 right-0 z-[100] shadow-[0_-5px_15px_rgba(0,0,0,0.05)]">
<div className="bg-gradient-to-r from-[#1e1b4b] to-[#2e1065] px-5 py-2 flex justify-between items-center border-t border-purple-950">
<div className="flex items-center gap-2">
<span className="text-[10px] font-black text-white/60 uppercase tracking-widest">Total JPY</span>
<span className="text-base font-black text-white tracking-tight">¥{totalAll.toLocaleString()}</span>
</div>
<div className="flex items-baseline gap-2">
<span className="text-[10px] font-black text-yellow-300/80 uppercase tracking-widest">約合 HKD</span>
<span className="text-base font-black text-yellow-300 tracking-tight">`${(totalAll / 20).toFixed(0)}</span>
</div>
</div>

{/* 底部導覽 Button */}
<div className="h-[60px] bg-white flex items-center justify-around border-t border-purple-50 px-1 pb-1">
<button onClick={() => setActiveTab('itinerary')} className={flex flex-col items-center gap-1 flex-1 ${activeTab === 'itinerary' ? 'text-pink-600' : 'text-purple-300'}}&gt; &lt;Icon name="calendar" className="w-5 h-5" /&gt;&lt;span className="text-[10px] font-black"&gt;行程&lt;/span&gt; &lt;/button&gt; &lt;button onClick={() =&gt; setActiveTab('places')} className={flex flex-col items-center gap-1 flex-1 ${activeTab === 'places' ? 'text-pink-600' : 'text-purple-300'}}>
<Icon name="map-pin" className="w-5 h-5" /><span className="text-[10px] font-black">地點</span>
</button>
<button onClick={() => setActiveTab('expense')} className={flex flex-col items-center gap-1 flex-1 ${activeTab === 'expense' ? 'text-pink-600' : 'text-purple-300'}}&gt; &lt;Icon name="credit-card" className="w-5 h-5" /&gt;&lt;span className="text-[10px] font-black"&gt;記帳&lt;/span&gt; &lt;/button&gt; &lt;button onClick={() =&gt; setActiveTab('info')} className={flex flex-col items-center gap-1 flex-1 ${activeTab === 'info' ? 'text-pink-600' : 'text-purple-300'}}>
<Icon name="cloud-sun" className="w-5 h-5" /><span className="text-[10px] font-black">攻略</span>
</button>
<button onClick={() => setActiveTab('phrase')} className={flex flex-col items-center gap-1 flex-1 ${activeTab === 'phrase' ? 'text-pink-600' : 'text-purple-300'}`}>
<Icon name="message-circle" className="w-5 h-5" /><span className="text-[10px] font-black">日語</span>
</button>
</div>
</div>

{/* 快速新增記帳彈窗 */}
{showModal && (
<div className="fixed inset-0 bg-purple-950/80 backdrop-blur-sm z-[400] flex items-center justify-center p-5 animate-in fade-in duration-200">
<div className="bg-white w-full max-w-sm rounded-3xl p-6 shadow-2xl">
<h3 className="text-lg font-black text-[#2e1065] mb-5">
{expenseType === 'trans' ? '🚇 新增交通車費' : '🛍️ 新增美食購物周邊'}
</h3>
<div className="space-y-4">
<div>
<label className="text-xs font-black text-purple-400 uppercase mb-1 block">項目名稱</label>
<input type="text" value={expenseDesc} onChange={e => setExpenseDesc(e.target.value)} placeholder="例如：USJ爆谷桶、近鐵車飛..." className="w-full bg-purple-50/50 border border-purple-100 rounded-xl px-4 py-2.5 text-sm font-bold text-purple-950 focus:outline-none focus:border-pink-500" />
</div>
<div>
<label className="text-xs font-black text-purple-400 uppercase mb-1 block">金額 (JPY)</label>
<input type="number" value={expenseCost} onChange={e => setExpenseCost(e.target.value)} placeholder="0" className="w-full bg-purple-50/50 border border-purple-100 rounded-xl px-4 py-2.5 text-base font-black text-[#2e1065] focus:outline-none focus:border-pink-500" />
</div>
<div>
<label className="text-xs font-black text-purple-400 uppercase mb-2 block">付款方式</label>
<div className="flex gap-2">
{['現金', '信用卡', 'IC卡'].map(method => (
<button
key={method}
onClick={() => setPaymentMethod(method)}
className={flex-1 py-2 rounded-xl text-xs font-black border transition-colors${paymentMethod === method ? 'bg-pink-50 border-pink-400 text-pink-700' : 'bg-white border-purple-100 text-purple-300'}} &gt; {method} &lt;/button&gt; ))} &lt;/div&gt; &lt;/div&gt; &lt;/div&gt; &lt;div className="flex gap-3 mt-6"&gt; &lt;button onClick={() =&gt; setShowModal(false)} className="flex-1 py-3 bg-purple-50 text-purple-500 rounded-xl font-black text-xs"&gt;取消&lt;/button&gt; &lt;button onClick={saveExpense} className={flex-1 py-3 text-white rounded-xl font-black text-xs ${expenseType === 'trans' ? 'bg-[#2e1065]' : 'bg-pink-600'}}>儲存紀錄</button>
</div>
</div>
</div>
)}

{/* 日語全螢幕大字模組 */}
{fullscreenNote && (
<div className="fixed inset-0 bg-[#1e1b4b] z-[300] flex flex-col items-center justify-center p-8" onClick={() => setFullscreenNote(null)}>
<div className="absolute inset-0 overflow-hidden pointer-events-none opacity-20">
{[...Array(20)].map((_, i) => (
<div key={modal-star-${i}} className="absolute text-yellow-300 neon-glow" style={{ top:{Math.random() * 100}%, fontSize:${Math.random() * 12 + 5}px` }}>✦</div>
))}
</div>
<button className="absolute top-8 right-8 p-4 text-white/50 z-20"><Icon name="x" className="w-10 h-10" /></button>
<div className="w-full text-center space-y-8 z-10">
<p className="text-yellow-300 text-lg font-black tracking-widest uppercase">{fullscreenNote.t}</p>
<div className="bg-white/10 rounded-3xl p-8 border border-white/20 backdrop-blur-md shadow-2xl">
<p className="text-3xl font-black text-white leading-relaxed break-words">{fullscreenNote.k.split('(')[0]}</p>
{fullscreenNote.k.includes('(') && <p className="text-sm font-mono text-pink-300 mt-2">{fullscreenNote.k.slice(fullscreenNote.k.indexOf('('))}</p>}
</div>
<button onClick={(e) => { e.stopPropagation(); playJapaneseVoice(fullscreenNote.k.split('(')[0], e); }} className="mx-auto flex items-center justify-center gap-2 bg-yellow-400 text-purple-950 px-6 py-3 rounded-full font-black text-lg shadow-lg">
<Icon name="volume-2" className="w-5 h-5" /> 播放語音給店員聽
</button>
<p className="text-purple-200 text-lg font-bold">{fullscreenNote.d}</p>
</div>
</div>
)}
</div>
);
};

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
</script>
</body>
</html>
